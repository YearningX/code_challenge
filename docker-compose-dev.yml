# Docker Compose - Development Mode Configuration
# For frontend development without rebuilding images

services:
  # ME ECU Assistant API Server - Development Mode
  ecu-assistant-api:
    build:
      context: web
      dockerfile: Dockerfile
    container_name: ecu-assistant-api-dev
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - MLFLOW_MODEL_URI=${MLFLOW_MODEL_URI:-/models/ecu_agent_model_local/ecu_agent_model}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - API_RELOAD=${API_RELOAD}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
    volumes:
      # 🔥 Development mode: Mount all frontend files for real-time updates
      - ./web/index.html:/app/index.html:ro
      - ./web/BOSCH_LOGO.png:/app/BOSCH_LOGO.png:ro

      # Data directory mounts
      - ./mlruns:/mlruns:ro
      - ./data:/data:ro
      - ./models:/models:ro

      # 🔥 Development mode: Mount Python source code (optional, for backend debugging)
      # - ./web/api_server.py:/app/api_server.py:ro
      # - ./web/config.py:/app/config.py:ro
    networks:
      - ecu-assistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.ecu-assistant.description=ME ECU Assistant - Development Mode"
      - "com.ecu-assistant.mode=development"
      - "com.ecu-assistant.hot-reload=true"

networks:
  ecu-assistant-network:
    driver: bridge
    name: ecu-assistant-network

volumes:
  mlflow-data:
    driver: local
