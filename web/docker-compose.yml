services:
  # ME ECU Assistant API Server
  ecu-assistant-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecu-assistant-api
    env_file:
      - ../.env
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - MLFLOW_MODEL_URI=${MLFLOW_MODEL_URI:-/app/models/ecu_agent_model_local/ecu_agent_model}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - API_RELOAD=${API_RELOAD}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
    volumes:
      # Mount MLflow runs directory from host
      - ../mlruns:/app/mlruns:ro
      # Mount data directory for documentation
      - ../data:/app/data:ro
      # Mount local model artifacts
      - ../models:/app/models:ro
      # Mount source code for development (optional)
      - ./api_server.py:/app/api_server.py:ro
      - ./config.py:/app/config.py:ro
      - ./index.html:/app/index.html:ro
      - ./BOSCH_LOGO.png:/app/BOSCH_LOGO.png:ro
    networks:
      - ecu-assistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.ecu-assistant.description=ME ECU Assistant API Server"
      - "com.ecu-assistant.version=1.0.0"

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: ecu-assistant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - ecu-assistant-network
    depends_on:
      - ecu-assistant-api
    restart: unless-stopped
    profiles:
      - production

networks:
  ecu-assistant-network:
    driver: bridge
    name: ecu-assistant-network

volumes:
  mlflow-data:
    driver: local
